      };
      const $ = (id) => document.getElementById(id);
      const btn = $("btn");
      const inp = $("pwd");
      const err = $("err");

      function b64ToU8(b64){
        const bin = atob(b64);
        const out = new Uint8Array(bin.length);
        for (let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
        return out;
      }
      async function deriveKey(password, saltBytes, iterations){
        const enc = new TextEncoder();
        const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: saltBytes, iterations: iterations, hash: "SHA-256" },
          baseKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
      }
      async function tryOpen(){
        err.textContent = "";
        const pwd = (inp.value || "").trim();
        if (!pwd) { err.textContent = "Введите пароль"; return; }
        btn.disabled = true;
        btn.textContent = "Открываю…";
        try{
          const key = await deriveKey(pwd, b64ToU8(meta.salt), meta.it);
          const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToU8(meta.iv) }, key, b64ToU8(meta.ct));
          const html = new TextDecoder().decode(plain);
          document.open();
          document.write(html);
          document.close();
        }catch(e){
          err.textContent = "Неверный пароль";
          btn.disabled = false;
          btn.textContent = "Открыть";
          try{ inp.focus(); inp.select(); }catch{}
        }
      }
      btn.onclick = tryOpen;
      inp.onkeydown = (e) => { if (e.key === "Enter") tryOpen(); };
      setTimeout(() => { try{ inp.focus(); }catch{} }, 50);
    })();
